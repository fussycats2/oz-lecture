<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>User Registration</title>
        <style>
        .layout {display: flex}
        main {width: 70%}
        aside {width: 30%}
        </style>
    </head>
    <body>
        <header>
            <img src="./images/ozlogo.png" alt="oz logo" width="100px" height="100px"/>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Register</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
            <h1>User Registration</h1>
        </header>
        <div class="layout">
        <main>
            <section>
                <h2>Registration Form</h2>
                <form action="#" method="POST">
                    <!-- 기본정보 -->
                    <div>
                    <label for="name">이름:</label>
                    <input type="text" id="name" name="name" placeholder="사용자의 이름"/>
                    <br />
                    <label for="email">이메일:</label>
                    <input type="email" id="email" name="email" placeholder="사용자의 이메일 주소"/>
                    <br />
                    <label for="password">비밀번호:</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호"/>
                    <br />
                    <label for="birthday">생년월일:</label>
                    <input type="date" id="birthday" name="birthday" placeholder="생년월일"/>
                    <br />
                    <label for="age">나이:</label>
                    <input type="number" id="age" name="age" min="18" max="100" placeholder="나이"/>
                    <br />
                    <label for="satisfaction">서비스 만족도:</label>
                    <input type="range" id="satisfaction" name="satisfaction" min="1" max="10"/>
                    </div>
                    <!-- 성별선택 -->
                    <div>
                    <h3>성별을 선택해주세요</h3>
                    <label for="male">남성</label>
                    <input type="radio" name="gender" id="male" value="male" />
                    <label for="female">여성</label>
                    <input type="radio" name="gender" id="female" value="female" />
                    <label for="other">기타</label>
                    <input type="radio" name="gender" id="other" value="other" />
                    </div>
                    <!-- 취미선택 -->
                    <div>
                    <h3>취미를 선택해주세요(중복선택가능)</h3>
                    <label for="coding">코딩</label>
                    <input type="checkbox" name="Interests" id="coding" value="coding" />
                    <label for="gaming">게임</label>
                    <input type="checkbox" name="Interests" id="gaming" value="gaming" />
                    <label for="reading">독서</label>
                    <input type="checkbox" name="Interests" id="reading" value="reading" />
                    </div>
                    <!-- 국가선택 -->
                    <div>
                    <h3>국가를 선택해주세요</h3>
                    <select name="country">
                    <option value="South Korea">한국</option>
                    <option value="USA">미국</option>
                    <option value="Japan">일본</option>
                    <option value="China">중국</option>
                    <option value="UK">영국</option>
                    </select>
                    </div>
                    <br />
                    <hr />
                    <!-- 제출/초기화 -->
                    <button type="submit">제출</button>
                    <button type="reset">초기화</button>
                </form>
            </section>
            <article>
            <h5>Why Register? Registering allows you to access exclusive features...</h5>
            </article>
        </main>
        <aside>
            <svg width="100" height="100">
            <rect x="50" y="50" width="40" height="40" stroke="black" stroke-width="2" fill="blue" />
            </svg>
            <!-- 디자인 canvas 자바스크립트 X -->
            <canvas id="aside" width="10" height="10">
            브라우저가 canvas를 지원하지 않습니다.
            </canvas>
            <ul>
                <li><a href="#">Registration Tips</a></li>
                <li><a href="#">Contact Support</a></li>
            </ul>
        </aside>
        </div>
        <footer>
            <video controls width="400">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
                <source src="https://www.w3schools.com/html/mov_bbb.webm" type="video/webm" />
                브라우저가 비디오를 지원하지 않습니다.
            </video>
            <p>&copy; 2025 Your Website</p>
        </footer>
    </body>
</html>
